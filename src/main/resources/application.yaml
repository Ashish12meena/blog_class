spring:
  application:
    name: wordle

  profiles:
    include:
      - redis
      - dev

  # Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/blog
    username: root
    password: meenagaming12@#
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Hibernate & MySQL Dialect Configuration
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # Without this, Spring Boot caps multipart uploads at 1MB by default —
  # any file upload bigger than that fails BEFORE it even reaches your
  # controller, with a confusing error. Raise these limits explicitly.
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Server Port
server:
  port: 8080

# ---------------------------------------------------------------------------
# Media / Storage Strategy Configuration
# ---------------------------------------------------------------------------
media:
  # Used by MediaService as the fallback backend when a client doesn't pass
  # a storageType param explicitly. Must match one of the StorageType enum
  # values (LOCAL or S3) — this is NOT used to conditionally create beans
  # in the resolver design (unlike the @ConditionalOnProperty version), it's
  # only the default choice the resolver looks up.
  default-storage-type: LOCAL

  local:
    # Folder on disk where uploaded files are physically written.
    # Relative path here resolves against wherever the app is run from.
    base-path: ./uploads/media
    # Prefix used to build the public URL returned to clients.
    # Requires a static resource handler (see note below) to actually
    # serve files from base-path at this URL.
    base-url: http://localhost:8080/api/media

  s3:
    bucket-name: bloggera-image
    # Public URL prefix for S3 objects. Standard virtual-hosted-style format:
    # https://<bucket-name>.s3.<region>.amazonaws.com
    base-url: https://bloggera-image.s3.amazonaws.com

# ---------------------------------------------------------------------------
# AWS Credentials — only read if/when S3StorageStrategy's S3Client bean
# actually gets used. Reading from environment variables (not hardcoded
# here) means these never get committed to git accidentally.
# ---------------------------------------------------------------------------
cloud:
  aws:
    region:
      static: ap-south-1
    credentials:
      access-key: ${AWS_ACCESS_KEY:020028129526}
      secret-key: ${AWS_SECRET_KEY:cBLrHm3syH1lz9+ak1vyUMnPPOOOMHFNik9u8Qml}


jwt:
  secret: "ChangeThisToALongRandomBase64SecretAtLeast256BitsForHS256Algorithm"
